<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- Dark version: cream + gold on deep forest green -->

  <!-- Background -->
  <circle cx="200" cy="200" r="200" fill="#1C3A28"/>

  <!-- Inner decorative ring -->
  <circle cx="200" cy="200" r="181" fill="none" stroke="#B8922E" stroke-width="1.5" opacity="0.55"/>

  <!-- PALM 1 — taller, background left -->
  <path d="M 158 368 C 155 310, 148 255, 145 200 C 143 165, 146 138, 152 108"
        stroke="#F8F5EC" stroke-width="7" fill="none" stroke-linecap="round"/>

  <!-- Fronds Palm 1 — from apex (152, 108), length 62 -->
  <g transform="translate(152, 108)">
    <path d="M 0 0 C -7 -14, -6 -38, 0 -62 C 6 -38, 7 -14, 0 0" fill="#F8F5EC" transform="rotate(0)"/>
    <path d="M 0 0 C -7 -14, -6 -38, 0 -62 C 6 -38, 7 -14, 0 0" fill="#F8F5EC" transform="rotate(38)"/>
    <path d="M 0 0 C -7 -14, -6 -38, 0 -62 C 6 -38, 7 -14, 0 0" fill="#F8F5EC" transform="rotate(72)"/>
    <path d="M 0 0 C -7 -14, -6 -38, 0 -62 C 6 -38, 7 -14, 0 0" fill="#F8F5EC" transform="rotate(-38)"/>
    <path d="M 0 0 C -7 -14, -6 -38, 0 -62 C 6 -38, 7 -14, 0 0" fill="#F8F5EC" transform="rotate(-72)"/>
    <path d="M 0 0 C -7 -14, -6 -38, 0 -62 C 6 -38, 7 -14, 0 0" fill="#F8F5EC" transform="rotate(110)"/>
  </g>

  <!-- PALM 2 — shorter, foreground center-left -->
  <path d="M 183 374 C 182 338, 182 305, 183 272 C 184 245, 184 212, 186 180"
        stroke="#F8F5EC" stroke-width="6" fill="none" stroke-linecap="round"/>

  <!-- Fronds Palm 2 — from apex (186, 180), length 52 -->
  <g transform="translate(186, 180)">
    <path d="M 0 0 C -6 -12, -5 -32, 0 -52 C 5 -32, 6 -12, 0 0" fill="#F8F5EC" transform="rotate(-18)"/>
    <path d="M 0 0 C -6 -12, -5 -32, 0 -52 C 5 -32, 6 -12, 0 0" fill="#F8F5EC" transform="rotate(14)"/>
    <path d="M 0 0 C -6 -12, -5 -32, 0 -52 C 5 -32, 6 -12, 0 0" fill="#F8F5EC" transform="rotate(44)"/>
    <path d="M 0 0 C -6 -12, -5 -32, 0 -52 C 5 -32, 6 -12, 0 0" fill="#F8F5EC" transform="rotate(-52)"/>
    <path d="M 0 0 C -6 -12, -5 -32, 0 -52 C 5 -32, 6 -12, 0 0" fill="#F8F5EC" transform="rotate(-92)"/>
  </g>

  <!-- Ground line — minimal anchor -->
  <path d="M 118 362 Q 168 355, 210 362" stroke="#F8F5EC" stroke-width="2.5" fill="none"
        opacity="0.35" stroke-linecap="round"/>

  <!-- TEXT BLOCK — right half, vertically centered -->
  <!-- PALM D'OR -->
  <text
    x="295" y="204"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="29"
    letter-spacing="4"
    fill="#F8F5EC"
  >PALM D&apos;OR</text>

  <!-- Gold divider -->
  <line x1="248" y1="217" x2="342" y2="217" stroke="#B8922E" stroke-width="0.9" opacity="0.65"/>

  <!-- DAKHLA -->
  <text
    x="295" y="236"
    text-anchor="middle"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="11"
    letter-spacing="7"
    fill="#B8922E"
  >DAKHLA</text>
</svg>
